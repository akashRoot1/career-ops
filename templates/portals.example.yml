# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Ashby --
  - name: Ashby — QA Engineer
    query: 'site:jobs.ashbyhq.com "QA Engineer" OR "QA Automation" OR "SDET" remote'
    enabled: true

  - name: Ashby — Quality Assurance
    query: 'site:jobs.ashbyhq.com "Quality Assurance" OR "Quality Engineer" remote'
    enabled: true

  - name: Ashby — Test Automation
    query: 'site:jobs.ashbyhq.com "Test Automation" OR "Test Engineer" OR "Automation Tester" remote'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — QA Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "QA Engineer" OR "QA Automation" OR "SDET" remote'
